name: web
version: 0.1.0
organization: null
project:
  identity: null
app:
  type: node
  path: .
  dockerfile: null
  image: null
  build: null
  ports: []
  volumes: []
  environment: {}
services:
- name: status-panel-web
  image: trydirect/status-panel-web:0.1.0
  ports:
  - 3000:3000
  environment:
    NODE_ENV: production
    NEXT_PUBLIC_SITE_URL: https://status.stacker.my
  volumes: []
  depends_on: []
- name: nginx_proxy_manager
  image: jc21/nginx-proxy-manager:latest
  ports:
  - 80:80
  - 443:443
  - 81:81
  environment: {}
  volumes:
  - npm_data:/data
  - npm_letsencrypt:/etc/letsencrypt
  depends_on: []
- name: smtp
  image: trydirect/smtp
  ports:
  - 1025:1025
  - 8025:8025
  environment: {}
  volumes:
  - smtp_data:/data
  depends_on: []
proxy:
  type: none
  auto_detect: false
  domains: []
  config: null
deploy:
  target: cloud
  environment: null
  compose_file: docker-compose.yml
  deployment_hash: null
  cloud:
    provider: hetzner
    orchestrator: remote
    region: nbg1
    size: cx23
    install_image: null
    remote_payload_file: null
    ssh_key: ~/.ssh/id_rsa
    key: null
    server: null
  server: null
  registry: null
  default_target: null
  targets: {}
environments: {}
ai:
  enabled: true
  provider: ollama
  model: qwen2.5-coder
  api_key: null
  endpoint: http://192.168.100.245:11434
  timeout: 0
