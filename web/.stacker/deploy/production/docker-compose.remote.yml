services:
  status-panel-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: trydirect/status-panel-web:latest
    container_name: status-panel-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://status.stacker.my
    restart: unless-stopped
  smtp:
    image: trydirect/smtp
    ports:
    - 1025:1025
    - 8025:8025
    volumes:
    - smtp_data:/data
    restart: unless-stopped
volumes:
  smtp_data:
    name: smtp_data
