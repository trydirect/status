{% extends "base.html" %}
{% block title %}Login — Status Panel{% endblock %}
{% block body %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <img src="/static/img/logo.webp" alt="Status Panel"/>
        </div>
        <form method="post">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" id="username" type="text" name="username" placeholder="Enter username" autofocus/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" id="password" type="password" name="password" placeholder="Enter password"/>
            </div>
            {% if error %}
            <div class="form-error">Invalid username or password.</div>
            {% endif %}
            <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center; margin-top:8px;">
                <span class="material-icons-outlined" style="font-size:18px;">login</span>
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
